name: CI

on:
  push:
    branches: ["**"]
    tags-ignore: ["**"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Check formatting
        run: uv run ruff format --check src/robot2mjcf tests

      - name: Lint with Ruff
        run: uv run ruff check src/robot2mjcf tests

      - name: Type check with mypy
        run: uv run mypy src/robot2mjcf tests
